                    <ul class="navbar-nav ms-auto gap-lg-4 pt-3 pt-lg-0">

                    </ul>
                </div>

        </nav>
    </header>

    <main class="flex-grow-1">
        <section class="container page-section">
            <div class="row g-5 align-items-stretch">
                <div class="col-12 col-lg-5">
                    <div class="surface-panel p-4 p-md-5 h-100">
                        <p class="section-kicker mb-2">05 // contact</p>
                        <h1 class="section-title mb-3">Let's build.</h1>
                        <p class="lead text-site-muted">Voor vragen, projecten of samenwerkingen kun je mij bereiken via mail of GitHub.</p>
                        <div class="list-group list-group-flush rounded overflow-hidden mt-4">
                            <a href="mailto:bart@example.com" class="list-group-item list-group-item-action py-3">bart@example.com</a>
                            <a href="https://github.com/Bart3456789" class="list-group-item list-group-item-action py-3">github.com/Bart3456789</a>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-lg-7">
                    <form class="surface-panel p-4 p-md-5 h-100" data-contact-form>
                        <h2 class="h3 fw-bold mb-4">Quick message</h2>
                        <div class="row g-3">
                            <div class="col-12 col-md-6"><label for="name" class="form-label">Naam</label><input type="text" class="form-control form-control-lg" id="name" name="name" placeholder="Jouw naam"></div>
                            <div class="col-12 col-md-6"><label for="email" class="form-label">E-mail</label><input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="jij@example.com"></div>
                            <div class="col-12"><label for="message" class="form-label">Bericht</label><textarea class="form-control" id="message" name="message" rows="6" placeholder="Waar wil je contact over opnemen?"></textarea></div>
                            <div class="col-12"><button class="btn btn-site btn-lg" type="submit">Open mail</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
